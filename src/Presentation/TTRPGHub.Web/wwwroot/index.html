<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Таверна Аферистов</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Blazor.Bootstrap -->
    <link href="_content/Blazor.Bootstrap/blazor.bootstrap.css" rel="stylesheet" />
    <!-- Google Fonts: Cinzel (заголовки) + Exo 2 (текст) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- Тема "Тёмная магия" -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Таверна" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link href="TTRPGHub.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="ta-splash d-flex flex-column align-items-center justify-content-center vh-100">
            <div class="ta-splash-logo mb-4">
                <i class="bi bi-shield-fill-exclamation" style="font-size: 4rem; color: var(--ta-accent);"></i>
            </div>
            <h1 class="ta-brand mb-2">Таверна Аферистов</h1>
            <div class="ta-loading-bar mt-4">
                <div class="ta-loading-fill"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        Произошла непредвиденная ошибка.
        <a href="." class="alert-link ms-1">Перезагрузить</a>
    </div>

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_content/Blazor.Bootstrap/blazor.bootstrap.js"></script>
    <script src="js/download.js"></script>
    <script src="js/push.js"></script>
    <script src="js/table.js"></script>
    <script src="js/audio-sync.js"></script>
    <script src="js/token-drag.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>

</html>
