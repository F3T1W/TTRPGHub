services:

  postgres:
    image: postgres:16-alpine
    container_name: taverna_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taverna_db
      POSTGRES_USER: taverna
      POSTGRES_PASSWORD: taverna_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taverna -d taverna_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taverna_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: taverna_seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8080:80"

volumes:
  postgres_data:
